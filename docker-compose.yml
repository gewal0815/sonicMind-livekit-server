version: "3.8"

# SonicMind – LiveKit SFU server
# Deploy on Railway or any Docker host.
#
# Required environment variables (set in Railway dashboard or .env):
#   LIVEKIT_API_KEY     — your API key string
#   LIVEKIT_API_SECRET  — your API secret string
#   TURN_DOMAIN         — domain / IP for the TURN server
#   WEBHOOK_URL         — Supabase edge function URL for webhook events (optional)

services:
  livekit:
    image: livekit/livekit-server:latest
    # Pass config file; env vars inside livekit.yaml are expanded at runtime
    command: --config /etc/livekit/livekit.yaml
    restart: unless-stopped
    # Host networking gives best UDP performance on Linux (required for Railway)
    network_mode: host
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - TURN_DOMAIN=${TURN_DOMAIN:-localhost}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 3
