# LiveKit server configuration
# Replace all ${...} placeholders with your actual values before deploying.
# On Railway: set these as environment variables and reference them here,
# OR replace them inline before committing to a private repo.

port: 7880

# Bind to all interfaces
bind_addresses:
  - ""

rtc:
  # Separate TCP port for WebRTC signaling
  tcp_port: 7881
  # UDP port range for media transport
  port_range_start: 50000
  port_range_end: 60000
  # Required on cloud hosts where public IP isn't directly on the NIC
  use_external_ip: true

# TURN server (needed when UDP is blocked by firewalls)
turn:
  enabled: true
  # Set TURN_DOMAIN to your server's domain or IP
  domain: ${TURN_DOMAIN}
  tls_port: 5349
  udp_port: 3478
  # Delegate TLS termination to a reverse proxy (Caddy/nginx)
  external_tls: true

# API keys — add as many key:secret pairs as needed
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  level: info

# Webhook — LiveKit posts room/participant events to your backend
webhook:
  api_key: ${LIVEKIT_API_KEY}
  urls:
    - ${WEBHOOK_URL}
